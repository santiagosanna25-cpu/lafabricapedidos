<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Fábrica</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html, body {
  touch-action: manipulation;
}

body{
  font-family:Arial,sans-serif;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* INPUTS */
.inputs{
  background:#1a1a1a;
  padding:15px;
}
.inputs input,.inputs textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#2a2a2a;
  color:white;
  font-size:15px;
}

/* PRODUCTOS */
.container{
  padding:10px;
  padding-bottom:140px;
}

.product{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1c1c1c;
  margin-bottom:12px;
  padding:12px;
  border-radius:14px;
  transition:0.2s;
}

.product:active{
  transform:scale(0.98);
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.foto{
  width:65px;
  height:65px;
  object-fit:cover;
  border-radius:10px;
}

.name{
  font-weight:bold;
  font-size:14px;
}

.price{
  color:#00ff88;
  font-size:13px;
}

/* CONTROLES */
.controls{
  display:flex;
  align-items:center;
  gap:6px;
}

button{
  background:#2f2f2f;
  border:none;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
}

button:active{
  background:#3f3f3f;
}

.cantidad{
  min-width:30px;
  text-align:center;
  font-weight:bold;
}

/* FOOTER */
.total{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-top:2px solid #1a1a1a;
}

.total-text{
  font-size:18px;
  font-weight:bold;
}

.botones-footer{
  display:flex;
  gap:10px;
}

.botones-footer button{
  flex:1;
  padding:14px;
}

.whatsapp{
  background:#25d366;
  color:black;
  font-weight:bold;
  font-size:16px;
}

.imprimir{
  background:#4a90e2;
  color:white;
  font-weight:bold;
  font-size:16px;
}

/* TICKET */
.print-ticket{
  display:none;
  background:white;
  color:black;
  padding:10mm;
  width:80mm;
  font-family:"Courier New",monospace;
  font-size:10pt;
}

.print-ticket h2{
  text-align:center;
  margin:5mm 0;
}

.separator{
  border-top:1px dashed black;
  margin:3mm 0;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:2mm 0;
}

.total-line{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  border-top:2px solid black;
  border-bottom:2px solid black;
  padding:2mm 0;
}

.footer{
  text-align:center;
  margin-top:5mm;
  font-size:8pt;
}

@media print{
  body{background:white;color:black}
  header,.inputs,.container,.total{display:none}
  .print-ticket{display:block !important}
}
</style>
</head>

<body>

<header>
<img src="logo.png">
</header>

<div class="inputs">
<input id="nombre" placeholder="👤 Tu nombre">
<textarea id="detalle" placeholder="📝 Aclaraciones..."></textarea>
</div>

<div class="container" id="products"></div>

<div class="total">
<div class="total-text">Total: $<span id="total">0</span></div>

<div class="botones-footer">
<button class="imprimir" onclick="imprimirPedido()">🖨️ Imprimir</button>
<button class="whatsapp" onclick="enviarPedido()">📱 WhatsApp</button>
</div>
</div>

<div id="print-container"></div>

<script>
const productos=[
{nombre:"Dulce de leche",precio:3600,img:"dulce.jpg"},
{nombre:"Quesillo tradicional",precio:3100,img:"quesillo.jpg"},
{nombre:"Dulce de chayote",precio:3500,img:"chayote.jpg"},
{nombre:"Mini mortadela",precio:5800,img:"mortadela.jpg"},
{nombre:"Queso semiduro",precio:7500,img:"semiduro.jpg"},
{nombre:"Caciocavallo",precio:8500,img:"caciocavallo.jpg"},
{nombre:"Holanda",precio:7500,img:"holanda.jpg"},
{nombre:"Queso cáscara roja",precio:7500,img:"cascararoja.jpg"},
{nombre:"Criollos medianos",precio:4250,img:"criollos.jpg"},
{nombre:"Criollitos",precio:3800,img:"criollitos.jpg"},
{nombre:"Queso criollo en barra",precio:8300,img:"barra.jpg"},
{nombre:"Provoleta",precio:4000,img:"provoleta.jpg"},
{nombre:"Criollitos al vacío",precio:4100,img:"vacio.jpg"},
{nombre:"Quesillos x10",precio:16000,img:"quesillos10.jpg"},
{nombre:"Higos en almíbar",precio:3300,img:"higos.jpg"},
{nombre:"Criollo grande",precio:7300,img:"grande.jpg"},
{nombre:"Rollitos de quesillo",precio:1800,img:"rollitos.jpg"},
{nombre:"Chacarero bastón",precio:6000,img:"chacarero.jpg"},
{nombre:"Salamines picado fino",precio:3600,img:"salamin.jpg"},
{nombre:"Rollitos x5",precio:8500,img:"rollitos5.jpg"},
{nombre:"Queso criollo",precio:7000,img:"criollo.jpg"},
{nombre:"Salame criollo bastón",precio:4500,img:"salame.jpg"}
];

let carrito=Array(productos.length).fill(0);

function render(){
const c=document.getElementById("products");
c.innerHTML="";

productos.forEach((p,i)=>{
c.innerHTML+=`
<div class="product">
<div class="left">
<img src="${p.img}" class="foto" onerror="this.src='logo.png'">
<div>
<div class="name">${p.nombre}</div>
<div class="price">$${p.precio}</div>
</div>
</div>

<div class="controls">
<button onclick="cambiar(${i},-10)">-10</button>
<button onclick="cambiar(${i},-1)">-</button>
<div class="cantidad">${carrito[i]}</div>
<button onclick="cambiar(${i},1)">+</button>
<button onclick="cambiar(${i},10)">+10</button>
</div>
</div>`;
});
}

function cambiar(i,q){
carrito[i]+=q;
if(carrito[i]<0)carrito[i]=0;
actualizarTotal();
render();
}

function actualizarTotal(){
let t=0;
productos.forEach((p,i)=> t+=p.precio*carrito[i]);
document.getElementById("total").innerText=t;
}

function generarTicket(){
if(!carrito.some(c=>c>0)){
alert("No agregaste productos");
return null;
}

let n=document.getElementById("nombre").value||"CLIENTE";
let d=document.getElementById("detalle").value;
let t=document.getElementById("total").innerText;
let f=new Date().toLocaleString('es-AR');

let h=`<div class="print-ticket">
<h2>LA FÁBRICA</h2>
<div class="separator"></div>
<div style="text-align:center"><strong>${n}</strong><br>${f}</div>
<div class="separator"></div>`;

productos.forEach((p,i)=>{
if(carrito[i]>0){
let s=p.precio*carrito[i];
h+=`<div class="item"><span>${p.nombre}</span><span>x${carrito[i]}</span></div>
<div class="item">$${p.precio} = $${s}</div>`;
}
});

h+=`<div class="separator"></div>
<div class="total-line"><span>TOTAL</span><span>$${t}</span></div>`;

if(d){
h+=`<div class="separator"></div>${d}`;
}

h+=`<div class="footer">Gracias por tu compra</div></div>`;

return h;
}

function imprimirPedido(){
let t=generarTicket();
if(!t)return;
document.getElementById("print-container").innerHTML=t;
setTimeout(()=>window.print(),100);
}

function enviarPedido(){
if(!carrito.some(c=>c>0)){
alert("No agregaste productos");
return;
}

let n=document.getElementById("nombre").value;
let d=document.getElementById("detalle").value;

let m="🧀 Pedido:\n\n";
if(n)m+="👤 "+n+"\n\n";

productos.forEach((p,i)=>{
if(carrito[i]>0){
m+=`${p.nombre} x${carrito[i]}\n`;
}
});

m+=`\n💰 Total: $${document.getElementById("total").innerText}`;
if(d)m+="\n\n📝 "+d;

window.open("https://wa.me/5493816062471?text="+encodeURIComponent(m));
}

render();
</script>

</body>
</html>
